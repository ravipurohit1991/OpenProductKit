site_name: OpenProductKit
site_description: A white-label product-template for web, CLI, plugins, licensing and more — from one decoupled core.
site_url: https://ravipurohit1991.github.io/OpenProductKit/
repo_url: https://github.com/ravipurohit1991/OpenProductKit
repo_name: ravipurohit1991/OpenProductKit
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/brand/openproductkit-favicon.svg
  favicon: assets/brand/openproductkit-favicon.svg
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Quickstart: quickstart.md
      - Generate a project: generating.md
      - Make it yours: replace-the-demo.md
      - Rebranding & updates: rebranding.md
  - Concepts:
      - Overview: concepts.md
      - Architecture: architecture.md
      - Desktop app: desktop.md
      - Plugins: plugins.md
      - Licensing: licensing.md
      - Marketplace: marketplace.md
      - Auth & users: auth.md
      - Deployment: deployment.md
      - Deploy recipes: deploy-recipes.md
      - Payments: payments.md
      - Releases & auto-update: releases.md
  - Reference:
      - CLI reference: cli.md
      - Template reference: template-reference.md
      - Settings: settings.md
      - FAQ: faq.md
  - Comparisons:
      - vs FastAPI full-stack template: comparisons/vs-fastapi-full-stack-template.md
      - vs desktop boilerplates: comparisons/vs-desktop-boilerplates.md
      - vs SaaS boilerplates: comparisons/vs-saas-boilerplates.md
  - Project:
      - Roadmap: roadmap.md
      - Changelog: changelog.md
      - Contributing: contributing.md
  - Blog:
      - A product template your AI agent can finish: blog/introducing-openproductkit.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
