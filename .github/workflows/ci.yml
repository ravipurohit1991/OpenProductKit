name: CI

# CI for the *template* itself: generate a project from the template and run its
# full suite on Linux and Windows. This is the guarantee that `copier copy`
# always produces a working, lint-clean, buildable project.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-and-test:
    name: generate & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # The generated project (not this template root) owns the lockfile,
          # so there is nothing here to cache — disable it to avoid a warning.
          enable-cache: false

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate a project from the template
        run: uvx copier copy --defaults --trust --vcs-ref HEAD . "${{ runner.temp }}/gen"

      - name: Backend — install workspace
        working-directory: ${{ runner.temp }}/gen
        run: uv sync --dev

      - name: Backend — lint (ruff)
        working-directory: ${{ runner.temp }}/gen
        run: uv run ruff check .

      - name: Backend — test (pytest, runs Alembic migrations)
        working-directory: ${{ runner.temp }}/gen
        run: uv run pytest

      - name: Desktop — smoke test (in-process bridge, headless)
        working-directory: ${{ runner.temp }}/gen
        run: uv run python -m openproductkit_desktop --check

      - name: Frontend — install
        working-directory: ${{ runner.temp }}/gen
        run: pnpm install

      - name: Typed client — drift gate (committed client matches the API)
        working-directory: ${{ runner.temp }}/gen
        run: uv run opk gen --check

      - name: Frontend — typecheck (against generated typed client)
        working-directory: ${{ runner.temp }}/gen
        run: pnpm -C apps/frontend typecheck

      - name: Frontend — build
        working-directory: ${{ runner.temp }}/gen
        run: pnpm -C apps/frontend build

  # Non-default template answers: each variant must generate, install, lint and
  # test; desktop variants also smoke-test their sidecar and shell sources.
  variants:
    name: variant (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: electron
            answers: "-d desktop_framework=electron"
          - name: tauri
            answers: "-d desktop_framework=tauri"
          - name: postgres-nodesktop
            answers: "-d desktop_framework=none -d database=postgres"
          - name: ai-saas
            answers: "-d include_ai_saas=true -d desktop_framework=none"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - uses: pnpm/action-setup@v4
        if: matrix.name == 'ai-saas'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: matrix.name == 'ai-saas'
        with:
          node-version: 22

      - name: Generate a project from the template
        run: uvx copier copy --defaults --trust --vcs-ref HEAD ${{ matrix.answers }} . "${{ runner.temp }}/gen"

      - name: Install workspace, lint, test
        working-directory: ${{ runner.temp }}/gen
        run: |
          uv sync --dev
          uv run ruff check .
          uv run pytest

      - name: Validate the compose file
        working-directory: ${{ runner.temp }}/gen
        run: docker compose config -q

      - name: AI SaaS — typed client and frontend
        if: matrix.name == 'ai-saas'
        working-directory: ${{ runner.temp }}/gen
        run: |
          pnpm install
          uv run opk gen --check
          pnpm -C apps/frontend typecheck
          pnpm -C apps/frontend build

      - name: Sidecar smoke test (headless)
        if: matrix.name == 'electron' || matrix.name == 'tauri'
        working-directory: ${{ runner.temp }}/gen
        run: uv run python apps/desktop-${{ matrix.name }}/server.py --check

      - name: Electron shell — syntax check
        if: matrix.name == 'electron'
        working-directory: ${{ runner.temp }}/gen
        run: node --check apps/desktop-electron/main.js

      - name: Tauri shell — cargo check
        if: matrix.name == 'tauri'
        working-directory: ${{ runner.temp }}/gen
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
          # tauri-build validates that frontendDist exists; a stub is enough
          # because the window loads the sidecar URL, not bundled assets.
          mkdir -p apps/frontend/dist && touch apps/frontend/dist/index.html
          cargo check --manifest-path apps/desktop-tauri/src-tauri/Cargo.toml

  docs:
    name: docs (build strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false
      - name: Build the docs site
        run: uvx --with-requirements requirements-docs.txt mkdocs build --strict
